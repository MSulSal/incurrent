name: Bug Report
description: Report a behavioral defect with reproducible steps.
title: "[Bug] "
labels: ["type:bug", "priority:p1"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the defect.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include commands, payloads, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User-facing or system-facing impact.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, metrics, screenshots, traces, or payload IDs.
    validations:
      required: true
