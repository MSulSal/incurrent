name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  json:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        shell: bash
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! jq empty "$file" >/dev/null 2>&1; then
              echo "Invalid JSON: $file" >&2
              failed=1
            fi
          done < <(find . -type f -name '*.json' -print0)

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github
          strict: false
          config_data: |
            extends: default
            rules:
              line-length:
                max: 180
                level: warning
              truthy:
                check-keys: false

  actionlint:
    name: GitHub Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actionlint
        uses: rhysd/actionlint@v1.7.11

  bash:
    name: Bash Script Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        shell: bash
        run: |
          shopt -s globstar nullglob
          scripts=(scripts/**/*.sh)
          if [[ "${#scripts[@]}" -eq 0 ]]; then
            echo "No bash scripts found."
            exit 0
          fi

          for script in "${scripts[@]}"; do
            bash -n "$script"
          done

  links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check (offline/local)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress .
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
