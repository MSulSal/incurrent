name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  powershell:
    name: PowerShell Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 -ErrorAction SilentlyContinue | ForEach-Object {
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$null,
              [ref]$parseErrors
            )
            if ($parseErrors) {
              $errors += $parseErrors
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw "PowerShell syntax validation failed."
          }
