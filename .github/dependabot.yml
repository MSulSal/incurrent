version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Chicago"
    labels:
      - "type:docs"
      - "track:foundation"
      - "priority:p2"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
